name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.1)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure git
        run: |
          git config user.name "RailsFoundry Release Bot"
          git config user.email "releases@workhorse.solutions"

      - name: Strip dev-only files
        run: |
          while IFS= read -r line || [[ -n "$line" ]]; do
            # skip blank lines and comments
            [[ -z "$line" || "$line" == \#* ]] && continue
            # unquoted to allow glob expansion
            rm -rf $line
            echo "Removed: $line"
          done < .foundry-release-ignore

      - name: Create orphan release commit
        run: |
          git checkout --orphan release-temp
          git add -A
          git commit -m "Release ${{ inputs.version }} ($(date -u '+%Y-%m-%d %H:%M UTC'))"

      - name: Tag release
        run: git tag ${{ inputs.version }}

      - name: Push tag
        run: git push origin ${{ inputs.version }}

      - name: Replace main with release snapshot
        run: git push --force origin release-temp:main
