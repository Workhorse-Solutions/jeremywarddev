name: ${APP_IDENTIFIER:-railsfoundry}

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/${APP_IDENTIFIER:-railsfoundry}_development
      TEST_DATABASE_URL: postgres://postgres:postgres@db:5432/${APP_IDENTIFIER:-railsfoundry}_test
      APP_IDENTIFIER: ${APP_IDENTIFIER:-railsfoundry}
      APP_NAME: ${APP_NAME:-RailsFoundry}
    depends_on:
      db:
        condition: service_healthy
      selenium:
        condition: service_started

  selenium:
    image: selenium/standalone-chromium
    restart: unless-stopped

  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres-data:
